nteligencia artificial`,`Procedimiento en 30 minutos aproximadamente`,`Alta hospitalaria el mismo día o al siguiente`,`Seguimiento médico, nutricional y deportivo incluido`],duration:`30 minutos aprox.`,recovery:`2–5 días`,ideal:`Obesidad grado I, II y III`}},{id:`manga`,tag:`MÍNIMAMENTE INVASIVO`,title:`Manga Gástrica Endoscópica`,short:`Reducción del estómago desde el interior, por vía oral. Sin incisiones. Incluye control clínico, deportivo y nutricional.`,pill:`Recuperación en días`,detail:{description:`La manga gástrica endoscópica es un tratamiento mínimamente invasivo en el que se introduce un endoscopio por la boca para reducir el tamaño del estómago desde el interior. No requiere incisiones ni deja cicatrices. Es una alternativa efectiva a la cirugía bariátrica tradicional con menor riesgo y recuperación más rápida.`,benefits:[`Sin incisiones ni cicatrices externas`,`Pérdida de peso significativa y sostenible`,`Recuperación en pocos días`,`Menos complicaciones que cirugía abierta`,`Mejora de calidad de vida general`,`Control clínico, deportivo y nutricional incluido`],duration:`45–60 minutos`,recovery:`3–7 días`,ideal:`Sobrepeso u obesidad grado I y II`}},{id:`balon`,tag:`DISPOSITIVO TEMPORAL`,title:`Balón Intragástrico`,short:`Dispositivo de silicona que ocupa espacio en el estómago para reducir la ingesta. 6–12 meses de acción.`,pill:`Sobrepeso grado I`,detail:{description:`El balón intragástrico es un dispositivo de silicona insertado en el estómago mediante endoscopia. Al ocupar espacio, reduce la capacidad gástrica y genera sensación de saciedad más rápida. Se coloca bajo sedación con solución salina estéril y permanece en el estómago entre 6 y 12 meses. Mejora condiciones asociadas como diabetes tipo 2, hipertensión y colesterol.`,benefits:[`Procedimiento completamente ambulatorio`,`Sin cicatrices ni incisiones`,`Pérdida de peso gradual y progresiva`,`Mejora de diabetes tipo 2 e hipertensión`,`Reversible: se retira a los 6–12 meses`,`Acompañamiento nutricional durante todo el proceso`],duration:`20–30 minutos`,recovery:`1–3 días`,ideal:`Sobrepeso u obesidad grado I`}},{id:`pose`,tag:`ENDOSCÓPICO`,title:`POSE Bariátrica`,short:`Reducción del estómago mediante puntos de sutura internos, sin incisiones externas. Alta el mismo día.`,pill:`Ambulatorio`,detail:{description:`La POSE (Primary Obesity Surgery Endoluminal) es un procedimiento endoscópico bariátrico en el que se realizan puntos de sutura internos para reducir el volumen gástrico. Se realiza completamente por vía oral bajo anestesia general, sin ningún tipo de incisión externa. El paciente recibe el alta hospitalaria el mismo día o al siguiente.`,benefits:[`Procedimiento completamente endoscópico`,`Sin incisiones ni cicatrices`,`Alta el mismo día del procedimiento`,`Reducción efectiva del volumen gástrico`,`Menor riesgo de complicaciones versus cirugía`,`Rápida reincorporación a actividades diarias`],duration:`45–60 minutos`,recovery:`2–4 días`,ideal:`Obesidad grado I y II`}},{id:`tore`,tag:`PARA REBOTE POST-CIRUGÍA`,title:`Método TORe`,short:`Trans Oral Reduction para pacientes que recuperaron peso tras una cirugía bariátrica previa. Sin nueva operación.`,pill:`Post-cirugía`,detail:{description:`El TORe (Trans Oral Reduction Endoscopy) es una técnica endoscópica diseñada para pacientes que recuperaron peso después de una cirugía bariátrica previa. Reduce el tamaño del estoma gástrico mediante suturas internas (3–4 pliegues), restaurando la restricción original sin necesidad de una nueva intervención quirúrgica. Se realiza por vía oral bajo anestesia general en aproximadamente 60 minutos.`,benefits:[`No requiere nueva cirugía`,`Procedimiento por vía oral sin incisiones`,`Restaura la restricción gástrica original`,`Duración aproximada de 60 minutos`,`Sin efecto rebote con seguimiento adecuado`,`Apto para pacientes post-bypass o post-manga`],duration:`60 minutos aprox.`,recovery:`3–5 días`,ideal:`Pacientes que recuperaron peso post-cirugía bariátrica`}},{id:`metabolico`,tag:`PROGRAMA INTEGRAL`,title:`Programa Clínico Metabólico`,short:`Combinación de estrategias médicas, nutricionales y de apoyo psicológico para pérdida de peso sostenible.`,pill:`Seguimiento continuo`,detail:{description:`El Programa Clínico Metabólico es un enfoque integral que combina medicina, nutrición y psicología para lograr una pérdida de peso sostenible a largo plazo. Incluye evaluaciones mensuales de composición corporal y velocidad metabólica, control cardíaco y pulmonar, plan nutricional personalizado y evaluaciones en gimnasio médico. Está diseñado para pacientes que buscan resultados duraderos con soporte continuo.`,benefits:[`Evaluación de velocidad metabólica mensual`,`Control de composición corporal mensual`,`Control cardíaco y pulmonar periódico`,`Plan nutricional completamente personalizado`,`Evaluaciones en gimnasio médico supervisado`,`Soporte psicológico durante todo el proceso`],duration:`Programa continuo (mínimo 6 meses)`,recovery:`No aplica`,ideal:`Cualquier grado de sobrepeso u obesidad`}}],so=[{date:`24 Abr 2026`,title:`Pastillas para bajar de peso: qué funciona y qué no`,excerpt:`Análisis de las opciones farmacológicas actuales para el control de peso, sus indicaciones y limitaciones según evidencia clínica.`,slug:`pastillas-bajar-peso`,relevant:!0},{date:`22 Abr 2026`,title:`¿Qué hace un cirujano bariátrico? 4 procedimientos efectivos`,excerpt:`Conoce los procedimientos bariátricos más efectivos disponibles hoy y cómo determinar cuál es el más adecuado según tu perfil metabólico.`,slug:`cirujano-bariatrico-procedimientos`,relevant:!0},{date:`22 Abr 2026`,title:`Cómo funciona la manga gástrica: guía completa 2026`,excerpt:`Todo lo que necesitas saber sobre la manga gástrica endoscópica: preparación, procedimiento, recuperación y resultados esperados.`,slug:`manga-gastrica-guia`,relevant:!0},{date:`21 Abr 2026`,title:`¿Cómo funciona Mounjaro para la pérdida de peso?`,excerpt:`El tirzepatide (Mounjaro) como opción complementaria en el tratamiento de la obesidad. Evidencia, efectos y consideraciones.`,slug:`mounjaro-perdida-peso`,relevant:!0},{date:`19 Ene 2026`,title:`IMC: qué es y para qué sirve realmente`,excerpt:`El índice de masa corporal como herramienta de evaluación inicial: sus alcances, limitaciones y cómo interpretarlo correctamente.`,slug:`que-es-imc`,relevant:!1,note:`Bajo potencial de tráfico AI-first: Google responde esto directo`},{date:`16 Ene 2026`,title:`¿Por qué no adelgazo? Causas ocultas y soluciones reales`,excerpt:`Las razones metabólicas, hormonales y conductuales que explican por qué perder peso es difícil para muchas personas.`,slug:`por-que-no-adelgazo`,relevant:!0},{date:`14 Ene 2026`,title:`Balón gástrico en Quito: todo lo que debes saber`,excerpt:`Guía local para pacientes en Quito que evalúan el balón intragástrico como opción de tratamiento.`,slug:`balon-gastrico-quito`,relevant:!0},{date:`13 Dic 2025`,title:`Endomanga MEGA: reducción sin cirugía en Ecuador`,excerpt:`El procedimiento exclusivo de Clínica SOM explicado paso a paso: qué es, cómo se realiza y qué esperar.`,slug:`endomanga-mega`,relevant:!0}],co=[{q:`¿Los tratamientos son seguros?`,a:`Sí. Todos los procedimientos son realizados por especialistas altamente calificados con certificación internacional, utilizando tecnología de última generación y los más altos estándares de seguridad clínica.`},{q:`¿Los procedimientos son invasivos?`,a:`No. Todos nuestros procedimientos son endoscópicos o mínimamente invasivos, realizados por vía oral bajo anestesia general. No requieren incisiones externas ni dejan cicatrices visibles.`},{q:`¿Veré resultados inmediatos?`,a:`Los resultados varían según el procedimiento y el paciente. La mayoría comienza a notar cambios significativos en las primeras semanas. El Programa Metabólico incluye seguimiento mensual para optimizar los resultados.`},{q:`¿Cómo sé qué tratamiento es adecuado para mí?`,a:`Durante tu valoración inicial gratuita, nuestro especialista evaluará tu IMC, historial médico, objetivos y condiciones asociadas para recomendarte el tratamiento más apropiado para tu caso.`},{q:`¿Tendré cicatrices visibles?`,a:`No. Todos los procedimientos endoscópicos se realizan por vía oral, sin incisiones externas. No existe ninguna cicatriz visible resultado de nuestros tratamientos.`},{q:`¿Qué sucede si tengo cirugía bariátrica previa y recuperé peso?`,a:`Disponemos de tratamientos específicos para rebote post-cirugía: el Método TORe y el Plasma Argón, que restauran la restricción gástrica sin necesidad de una nueva intervención quirúrgica.`},{q:`¿Cuánto tiempo dura la recuperación?`,a:`La mayoría de nuestros procedimientos tienen recuperación de 2 a 7 días. El paciente puede retomar sus actividades cotidianas en días, no en semanas como ocurre con la cirugía convencional.`},{q:`¿Ofrecen seguimiento después del procedimiento?`,a:`Sí. Todos nuestros tratamientos incluyen seguimiento médico, nutricional y deportivo. El Programa Clínico Metabólico ofrece control mensual completo para garantizar resultados permanentes.`},{q:`¿Tienen opciones para pacientes fuera de Quito?`,a:`Sí. Atendemos pacientes de todo Ecuador y Latinoamérica. Contáctanos para coordinar tu traslado, alojamiento y agenda de procedimiento en una visita eficiente.`}],lo=[{num:`01`,title:`Valoración inicial gratuita`,desc:`Consulta con nuestro especialista. Evaluamos tu IMC, historial médico, condiciones asociadas y objetivos personales.`,detail:`La valoración inicial es completamente gratuita y sin compromiso. En ella, nuestro médico especialista en medicina bariátrica realizará una evaluación completa que incluye: anamnesis detallada, medición de peso y composición corporal básica, evaluación de enfermedades asociadas (diabetes, hipertensión, dislipidemia) y revisión de tratamientos previos. Al finalizar, recibirás una recomendación personalizada y clara sobre el tratamiento más adecuado para tu caso.`},{num:`02`,title:`Diagnóstico completo`,desc:`Calorimetría directa, composición corporal, prueba de esfuerzo y plan nutricional personalizado.`,detail:`El diagnóstico completo incluye una batería de evaluaciones científicas: calorimetría directa (medición del gasto metabólico basal), análisis de composición corporal (masa grasa vs. muscular), prueba de esfuerzo cardiovascular, test muscular para diseñar tu plan de actividad física, y evaluación psicológica cuando corresponda. Este diagnóstico nos permite personalizar tu tratamiento con precisión clínica.`},{num:`03`,title:`Procedimiento en minutos`,desc:`Endoscopia por vía oral bajo anestesia general. Sin cortes. Sin cicatrices. Alta el mismo día.`,detail:`Todos nuestros procedimientos se realizan en nuestras instalaciones de Quito (Edificio CITIMED, piso 8) con anestesiólogo certificado. El paciente no debe ingerir alimentos las 8 horas previas. El procedimiento dura entre 20 y 60 minutos según el tipo. El paciente permanece en observación de 2 a 4 horas tras el procedimiento. La gran mayoría recibe el alta el mismo día. Se entrega informe médico detallado del procedimiento.`},{num:`04`,title:`Seguimiento y mantenimiento`,desc:`Control mensual de peso, composición corporal, evaluación deportiva y nutrición continua.`,detail:`El seguimiento post-procedimiento es fundamental para garantizar resultados permanentes. Incluye: visitas médicas mensuales de control, evaluaciones de composición corporal para verificar pérdida de grasa vs. masa muscular, ajuste continuo del plan nutricional, evaluaciones en gimnasio médico supervisado, control cardíaco y pulmonar periódico, y soporte psicológico ante rebotes emocionales. El objetivo es que tu transformación sea definitiva.`}];function B(){let e=(0,_.useRef)(null),[t,n]=(0,_.useState)(!1);return(0,_.useEffect)(()=>{let t=e.current;if(!t)return;let r=new IntersectionObserver(([e])=>{e.isIntersecting&&(n(!0),r.disconnect())},{threshold:.08,rootMargin:`0px 0px -40px 0px`});return r.observe(t),()=>r.disconnect()},[]),{ref:e,visible:t}}fun
